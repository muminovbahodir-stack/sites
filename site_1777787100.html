
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
header{text-align:center;padding:40px;font-size:32px;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;padding:20px}
.card{background:#1e293b;border-radius:20px;padding:20px;text-align:center}
button{margin-top:10px;padding:10px;border:0;border-radius:10px;background:#22c55e;color:white;font-weight:900}
.cart{position:fixed;bottom:0;width:100%;background:#22c55e;padding:15px;text-align:center;font-size:20px}
</style>
</head>

<body>

<header>🛒 My Shop</header>

<div class="grid">
<div class="card">🍔<br>Burger $4.99<button onclick="add(4.99)">ADD</button></div>
<div class="card">🍟<br>Fries $1.49<button onclick="add(1.49)">ADD</button></div>
<div class="card">🍕<br>Pizza $7.99<button onclick="add(7.99)">ADD</button></div>
<div class="card">🥤<br>Coke $1.49<button onclick="add(1.49)">ADD</button></div>
</div>

<div class="cart" id="cart">Total: $0</div>

<script>
let total=0;
function add(p){
  total+=p;
  document.getElementById("cart").innerText="Total: $"+total.toFixed(2);
}
</script>

</body>
</html>
